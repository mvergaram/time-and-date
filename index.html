<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hora Mundial</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        [data-theme="dark"] {
            --bg:             #075056;
            --bg-card:        #054044;
            --bg-input:       #054044;
            --border:         #0a6870;
            --border-focus:   #7dd4d8;
            --text:           #EEF7FF;
            --text-muted:     #8ecdd0;
            --text-dim:       #3a8a8e;
            --accent:         #7dd4d8;
            --remove:         #2a7a7e;
            --scrollbar:      #0a6870;
            --empty-icon:     #0a6870;
            --empty-text:     #2a7a7e;
            --shadow:         rgba(0,0,0,0.4);
            --dropdown-hover: #0a6870;
            --footer-text:    #2a7a7e;
        }

        [data-theme="light"] {
            --bg:             linear-gradient(160deg, #9ec8e0 0%, #cce6f2 40%, #eef7ff 100%);
            --bg-card:        rgba(255,255,255,0.68);
            --bg-input:       rgba(255,255,255,0.80);
            --border:         rgba(7,80,86,0.15);
            --border-focus:   #075056;
            --text:           #075056;
            --text-muted:     #2a7a82;
            --text-dim:       #6ab0b6;
            --accent:         #075056;
            --remove:         #a8cfd4;
            --scrollbar:      #6ab0b6;
            --empty-icon:     #a8cfd4;
            --empty-text:     #6ab0b6;
            --shadow:         rgba(7,80,86,0.10);
            --dropdown-hover: rgba(7,80,86,0.07);
            --footer-text:    #6ab0b6;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 2.5rem 1.5rem 3rem;
            display: flex;
            flex-direction: column;
            transition: background 0.3s, color 0.3s;
        }

        main { flex: 1; }

        /* ── Header ── */
        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
            position: relative;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            color: var(--text);
        }

        h1 span { color: var(--accent); }

        .header-controls {
            position: absolute;
            right: 0;
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .ctrl-btn {
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            cursor: pointer;
            padding: 0.4rem 0.65rem;
            font-size: 0.85rem;
            font-weight: 600;
            line-height: 1;
            transition: border-color 0.2s, background 0.2s;
            white-space: nowrap;
        }

        .ctrl-btn:hover { border-color: var(--border-focus); }

        /* ── Search ── */
        .search-wrapper {
            position: relative;
            max-width: 480px;
            margin: 0 auto 2.5rem;
        }

        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            pointer-events: none;
            font-size: 1rem;
        }

        .search-input {
            width: 100%;
            padding: 0.875rem 1rem 0.875rem 2.75rem;
            font-size: 1rem;
            background: var(--bg-input);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s, background 0.2s;
        }

        .search-input:focus { border-color: var(--border-focus); }
        .search-input::placeholder { color: var(--text-dim); }

        /* ── Dropdown ── */
        .dropdown {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            right: 0;
            background: var(--bg-input);
            border: 2px solid var(--border);
            border-radius: 12px;
            max-height: 320px;
            overflow-y: auto;
            z-index: 200;
            display: none;
            box-shadow: 0 8px 32px var(--shadow);
        }

        .dropdown.open { display: block; }

        .dropdown-item {
            padding: 0.65rem 1rem;
            cursor: pointer;
            display: grid;
            grid-template-columns: 1fr auto;
            grid-template-rows: auto auto;
            gap: 0 0.75rem;
            transition: background 0.12s;
        }

        .dropdown-item:hover { background: var(--dropdown-hover); }
        .dropdown-item:first-child { border-radius: 10px 10px 0 0; }
        .dropdown-item:last-child  { border-radius: 0 0 10px 10px; }
        .dropdown-item:only-child  { border-radius: 10px; }

        .di-name    { font-weight: 500; font-size: 0.95rem; grid-row: 1; grid-column: 1; }
        .di-country { color: var(--text-muted); font-size: 0.8rem; grid-row: 2; grid-column: 1; }
        .di-tz      { color: var(--text-dim); font-size: 0.75rem; grid-row: 1 / 3; grid-column: 2;
                      align-self: center; white-space: nowrap; font-family: monospace; }

        .no-results {
            padding: 0.9rem 1rem;
            color: var(--text-dim);
            font-size: 0.9rem;
            text-align: center;
        }

        /* ── Grid ── */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
            gap: 1rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ── Card ── */
        .card {
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 16px;
            padding: 1.25rem 1.25rem 1rem;
            transition: border-color 0.2s, transform 0.15s;
            backdrop-filter: blur(6px);
        }

        .card:hover {
            border-color: var(--border-focus);
            transform: translateY(-2px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.75rem;
        }

        .card-title { flex: 1; }

        .city-name    { font-size: 1rem; font-weight: 600; line-height: 1.2; color: var(--text); }
        .city-country { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.15rem; }

        .remove-btn {
            background: none;
            border: none;
            color: var(--remove);
            cursor: pointer;
            font-size: 1.1rem;
            line-height: 1;
            padding: 0.2rem;
            border-radius: 6px;
            transition: color 0.15s, background 0.15s;
            flex-shrink: 0;
            margin-left: 0.5rem;
            margin-top: -0.1rem;
        }

        .remove-btn:hover { color: #ef4444; background: rgba(239,68,68,0.12); }

        .city-time {
            font-size: 2.4rem;
            font-weight: 300;
            color: var(--accent);
            font-variant-numeric: tabular-nums;
            letter-spacing: -1px;
            line-height: 1;
        }

        .city-date   { font-size: 0.78rem; color: var(--text-muted); margin-top: 0.35rem; text-transform: capitalize; }
        .city-offset { font-size: 0.72rem; color: var(--text-dim);   margin-top: 0.4rem; }

        /* ── Empty state ── */
        .empty {
            text-align: center;
            padding: 5rem 2rem;
            grid-column: 1 / -1;
        }

        .empty svg { width: 48px; height: 48px; stroke: var(--empty-icon); margin-bottom: 1rem; }
        .empty p   { font-size: 1rem; color: var(--empty-text); }

        /* ── Footer ── */
        footer {
            text-align: center;
            margin-top: 3rem;
            font-size: 0.78rem;
            color: var(--footer-text);
            letter-spacing: 0.01em;
        }

        footer a {
            color: var(--text-dim);
            text-decoration: none;
            border-bottom: 1px dotted var(--text-dim);
        }

        footer a:hover { color: var(--accent); border-color: var(--accent); }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--border-focus); }
    </style>
</head>

<main>
    <div class="header">
        <h1 id="appTitle"></h1>
        <div class="header-controls">
            <button class="ctrl-btn" id="langBtn" title="Change language / Cambiar idioma"></button>
            <button class="ctrl-btn" id="themeBtn" title=""></button>
        </div>
    </div>

    <div class="search-wrapper">
        <span class="search-icon">&#9906;</span>

            type="text"

            autocomplete="off"
            spellcheck="false"

        <div id="dropdown" class="dropdown"></div>

    <div id="grid" class="grid"></div>
</main>

function t(key) { return TRANSLATIONS[currentLang][key]; }

// ── Language ─────────────────────────────────────────────────────────────────
function detectLang() {
    const saved = localStorage.getItem(LANG_KEY);
    if (saved && TRANSLATIONS[saved]) return saved;
    const browser = (navigator.language || navigator.userLanguage || 'es').toLowerCase();
    return browser.startsWith('es') ? 'es' : 'en';
}

function applyLang(lang, save = true) {
    currentLang = lang;
    document.documentElement.lang = lang;
    if (save) localStorage.setItem(LANG_KEY, lang);

    document.getElementById('appTitle').innerHTML   = t('title');
    document.getElementById('searchInput').placeholder = t('placeholder');
    document.getElementById('langBtn').textContent  = lang === 'es' ? 'EN' : 'ES';
    document.getElementById('themeBtn').title        = t('changeTheme');
    document.getElementById('footer').innerHTML      = t('footer');

    // Re-render cards (date locale may change)
    renderFull();
}

document.getElementById('langBtn').addEventListener('click', () => {
    applyLang(currentLang === 'es' ? 'en' : 'es');
});

// ── Theme ─────────────────────────────────────────────────────────────────────
function applyTheme(theme, save = true) {
    document.documentElement.setAttribute('data-theme', theme);
    document.getElementById('themeBtn').textContent = theme === 'dark' ? '☀' : '☾';
    if (save) localStorage.setItem(THEME_KEY, theme);
}

document.getElementById('themeBtn').addEventListener('click', () => {
    const cur = document.documentElement.getAttribute('data-theme');
    applyTheme(cur === 'dark' ? 'light' : 'dark');
});

// Look up the full CITIES entry for a stored city (handles objects saved before new fields were added)
function lookupCity(stored) {
    return CITIES.find(c => c.name === stored.name && c.tz === stored.tz) || stored;
}

function cityName(city) {
    const full = lookupCity(city);
    return (currentLang === 'en' && full.nameEn) ? full.nameEn : full.name;
}

function cityCountry(city) {
    const full = lookupCity(city);
    return (currentLang === 'en' && full.countryEn) ? full.countryEn : full.country;
}

function loadCities() {
    try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) selectedCities = JSON.parse(raw);
    } catch { selectedCities = []; }
}

function saveCities() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(selectedCities));
}

function cityKey(c) { return c.name + '||' + c.tz; }

function addCity(city) {
    if (selectedCities.some(c => cityKey(c) === cityKey(city))) return;
    selectedCities.push(city);
    saveCities();
    renderFull();
}

function removeCity(key) {
    selectedCities = selectedCities.filter(c => cityKey(c) !== key);
    saveCities();
    renderFull();
}

function getSecondOfDay(tz) {
    const now = new Date();
    const parts = new Intl.DateTimeFormat('en', {
        year: 'numeric', month: 'numeric', day: 'numeric',
        hour: 'numeric', minute: 'numeric', second: 'numeric',
        hour12: false, hourCycle: 'h23', timeZone: tz
    }).formatToParts(now);
    const get = type => parseInt(parts.find(p => p.type === type).value);
    const dayEpoch = Date.UTC(get('year'), get('month') - 1, get('day')) / 86400000;
    return dayEpoch * 86400 + get('hour') * 3600 + get('minute') * 60 + get('second');
}

function sortedCities() {
    return [...selectedCities].sort((a, b) => {
        const dt = getSecondOfDay(a.tz) - getSecondOfDay(b.tz);
        return dt !== 0 ? dt : b.lat - a.lat;
    });
}

function formatTime(tz) {
    return new Intl.DateTimeFormat(t('dateLocale'), {
        hour: '2-digit', minute: '2-digit', second: '2-digit',
        hour12: false, hourCycle: 'h23', timeZone: tz
    }).format(new Date());
}

function formatDate(tz) {
    return new Intl.DateTimeFormat(t('dateLocale'), {
        weekday: 'short', day: 'numeric', month: 'short', year: 'numeric',
        timeZone: tz
    }).format(new Date());
}

function formatOffset(tz) {
    const parts = new Intl.DateTimeFormat('en', {
        timeZone: tz, timeZoneName: 'shortOffset'
    }).formatToParts(new Date());
    return parts.find(p => p.type === 'timeZoneName')?.value ?? tz;
}

function renderFull() {
    const grid = document.getElementById('grid');

    if (selectedCities.length === 0) {
        grid.innerHTML = `
            <div class="empty">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <polyline points="12 6 12 12 16 14"/>
                </svg>
                <p>${t('empty')}</p>
            </div>`;
        lastSortKeys = '';
        return;
    }

    const sorted = sortedCities();
    lastSortKeys = sorted.map(cityKey).join('|');

    grid.innerHTML = sorted.map(city => {
        const key = cityKey(city);
        return `
        <div class="card" data-key="${escHtml(key)}">
            <div class="card-header">
                <div class="card-title">
                    <div class="city-name">${escHtml(cityName(city))}</div>
                    <div class="city-country">${escHtml(cityCountry(city))}</div>
                </div>
                <button class="remove-btn" onclick="removeCity('${escAttr(key)}')" title="${escAttr(t('remove'))}">&#x2715;</button>
            </div>
            <div class="city-time" data-tz="${escAttr(city.tz)}">${formatTime(city.tz)}</div>
            <div class="city-date" data-tz-date="${escAttr(city.tz)}">${formatDate(city.tz)}</div>
            <div class="city-offset">${escHtml(formatOffset(city.tz))}</div>
        </div>`;
    }).join('');
}

function tickUpdate() {
    if (selectedCities.length === 0) return;

    const sorted  = sortedCities();
    const newKeys = sorted.map(cityKey).join('|');

    if (newKeys !== lastSortKeys) { renderFull(); return; }

    document.querySelectorAll('[data-tz]').forEach(el => {
        el.textContent = formatTime(el.dataset.tz);
    });
    document.querySelectorAll('[data-tz-date]').forEach(el => {
        el.textContent = formatDate(el.dataset.tzDate);
    });
}

function escHtml(s) {
    return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
function escAttr(s) {
    return String(s).replace(/'/g, '&#39;').replace(/"/g, '&quot;');
}

// ── Search ────────────────────────────────────────────────────────────────────
const searchInput = document.getElementById('searchInput');
const dropdown    = document.getElementById('dropdown');

function normalize(s) {
    return s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
}

searchInput.addEventListener('input', () => {
    const q = normalize(searchInput.value.trim());
    if (!q) { closeDropdown(); return; }

    const results = CITIES.filter(c =>
        normalize(c.name).includes(q) ||
        normalize(c.nameEn || '').includes(q) ||
        normalize(c.country).includes(q) ||
        normalize(c.countryEn || '').includes(q)
    ).slice(0, 12);

    if (!results.length) {
        dropdown.innerHTML = `<div class="no-results">${t('noResults')}</div>`;
        dropdown.classList.add('open');
        return;
    }

    dropdown.innerHTML = results.map(c =>
        `<div class="dropdown-item" onclick="pickCity(${CITIES.indexOf(c)})">
            <span class="di-name">${escHtml(cityName(c))}</span>
            <span class="di-country">${escHtml(cityCountry(c))}</span>
            <span class="di-tz">${escHtml(formatOffset(c.tz))}</span>
        </div>`
    ).join('');
    dropdown.classList.add('open');
});

function pickCity(idx) {
    addCity(CITIES[idx]);
    searchInput.value = '';
    closeDropdown();
    searchInput.focus();
}

function closeDropdown() {
    dropdown.classList.remove('open');
    dropdown.innerHTML = '';
}

document.addEventListener('click', e => {
    if (!e.target.closest('.search-wrapper')) closeDropdown();
});

searchInput.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeDropdown(); searchInput.blur(); }
});

// ── Init ──────────────────────────────────────────────────────────────────────
applyTheme(localStorage.getItem(THEME_KEY) || 'dark', false);
loadCities();
applyLang(detectLang(), false);   // renders grid + sets all UI strings
setInterval(tickUpdate, 1000);
</script>
</body>
</html>
